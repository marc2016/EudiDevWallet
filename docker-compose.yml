services:
  app-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

  app:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
